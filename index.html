<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 추천기 (5게임)</title>

<style>
:root{
    --bg-gradient:linear-gradient(135deg,#4facfe,#00f2fe);
    --card-bg:#fff;
    --text-main:#333;
    --text-sub:#777;
    --game-bg:#fafafa;
    --game-border:#e5e5e5;
}

[data-theme="dark"]{
    --bg-gradient:linear-gradient(135deg,#232526,#0f2027);
    --card-bg:#1e1e1e;
    --text-main:#eee;
    --text-sub:#aaa;
    --game-bg:#2a2a2a;
    --game-border:#3a3a3a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Pretendard","Malgun Gothic",sans-serif;
}

body{
    background:var(--bg-gradient);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    transition:background .3s;
}

.container{
    position:relative;
    width:100%;
    max-width:850px;
    background:var(--card-bg);
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    transition:background .3s;
}

.theme-toggle{
    position:absolute;
    top:20px;
    right:20px;
    width:44px;
    height:44px;
    margin:0;
    padding:0;
    border-radius:50%;
    font-size:20px;
    background:var(--game-bg);
    border:1px solid var(--game-border);
    color:var(--text-main);
}

.theme-toggle:hover{
    background:var(--game-bg);
    transform:scale(1.1);
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:var(--text-main);
}

p{
    text-align:center;
    color:var(--text-sub);
    margin-bottom:30px;
}

#lottoContainer{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.game{
    background:var(--game-bg);
    border-radius:15px;
    padding:18px;
    border:1px solid var(--game-border);
    transition:background .3s,border-color .3s;
}

.game-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
    color:var(--text-main);
}

.numbers{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.ball{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    font-weight:bold;
    animation:pop .4s;
    box-shadow:0 5px 10px rgba(0,0,0,.15);
}

.plus{
    display:flex;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    color:var(--text-sub);
}

button{
    display:block;
    margin:35px auto 0;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#007bff;
    color:white;
    transition:.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.05);
}

@keyframes pop{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@media(max-width:600px){

.ball{
    width:45px;
    height:45px;
    font-size:16px;
}

.game-title{
    font-size:18px;
}

}
</style>

</head>
<body>

<div class="container">

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

<h1>🎲 로또 번호 추천기</h1>
<p>버튼을 누르면 로또 번호 5게임을 추천합니다.</p>

<div id="lottoContainer"></div>

<button onclick="generateFiveGames()">
🎲 번호 5게임 추천받기
</button>

</div>

<script>

function getColor(num){

    if(num<=10) return "#fbc400";     // 노랑
    if(num<=20) return "#69c8f2";     // 파랑
    if(num<=30) return "#ff7272";     // 빨강
    if(num<=40) return "#aaaaaa";     // 회색
    return "#7bcc66";                 // 초록

}

function createGame(){

    const numbers=[];

    while(numbers.length<6){

        const random=Math.floor(Math.random()*45)+1;

        if(!numbers.includes(random)){
            numbers.push(random);
        }

    }

    numbers.sort((a,b)=>a-b);

    let bonus;

    do{
        bonus=Math.floor(Math.random()*45)+1;
    }while(numbers.includes(bonus));

    return {numbers,bonus};

}

function generateFiveGames(){

    const container=document.getElementById("lottoContainer");
    container.innerHTML="";

    const labels=["A","B","C","D","E"];

    for(let i=0;i<5;i++){

        const game=createGame();

        const gameDiv=document.createElement("div");
        gameDiv.className="game";

        const title=document.createElement("div");
        title.className="game-title";
        title.textContent=`${labels[i]} 게임`;

        const numbers=document.createElement("div");
        numbers.className="numbers";

        game.numbers.forEach(num=>{

            const ball=document.createElement("div");
            ball.className="ball";
            ball.style.background=getColor(num);
            ball.textContent=num;

            numbers.appendChild(ball);

        });

        const plus=document.createElement("div");
        plus.className="plus";
        plus.textContent="+";

        const bonusBall=document.createElement("div");
        bonusBall.className="ball";
        bonusBall.style.background=getColor(game.bonus);
        bonusBall.textContent=game.bonus;

        numbers.appendChild(plus);
        numbers.appendChild(bonusBall);

        gameDiv.appendChild(title);
        gameDiv.appendChild(numbers);

        container.appendChild(gameDiv);

    }

}

function applyTheme(theme){

    document.documentElement.setAttribute("data-theme",theme);
    document.getElementById("themeToggle").textContent=theme==="dark" ? "☀️" : "🌙";
    localStorage.setItem("theme",theme);

}

function toggleTheme(){

    const current=document.documentElement.getAttribute("data-theme");
    applyTheme(current==="dark" ? "light" : "dark");

}

const savedTheme=localStorage.getItem("theme")
    || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

applyTheme(savedTheme);

</script>

</body>
</html>
