<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타로 리딩</title>

<style>
:root{
    --bg-gradient:linear-gradient(135deg,#4facfe,#00f2fe);
    --card-bg:#fff;
    --text-main:#333;
    --text-sub:#777;
    --game-bg:#fafafa;
    --game-border:#e5e5e5;
}

[data-theme="dark"]{
    --bg-gradient:linear-gradient(135deg,#232526,#0f2027);
    --card-bg:#1e1e1e;
    --text-main:#eee;
    --text-sub:#aaa;
    --game-bg:#2a2a2a;
    --game-border:#3a3a3a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Pretendard","Malgun Gothic",sans-serif;
}

body{
    background:var(--bg-gradient);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
    transition:background .3s;
}

.page{
    display:flex;
    align-items:flex-start;
    justify-content:center;
    gap:24px;
    width:100%;
    max-width:1250px;
}

.container{
    position:relative;
    width:100%;
    max-width:850px;
    margin:0 auto;
    background:var(--card-bg);
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    transition:background .3s;
}

.comments-container{
    flex:1 1 350px;
    max-width:380px;
    background:var(--card-bg);
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    transition:background .3s;
}

.comments-container h2{
    text-align:center;
    margin-bottom:20px;
    color:var(--text-main);
    font-size:22px;
}

@media(max-width:900px){

.page{
    flex-direction:column;
    align-items:center;
}

.comments-container{
    max-width:850px;
    width:100%;
}

}

.theme-toggle{
    position:absolute;
    top:20px;
    right:20px;
    width:44px;
    height:44px;
    margin:0;
    padding:0;
    border-radius:50%;
    font-size:20px;
    background:var(--game-bg);
    border:1px solid var(--game-border);
    color:var(--text-main);
}

.theme-toggle:hover{
    background:var(--game-bg);
    transform:scale(1.1);
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:var(--text-main);
}

p{
    text-align:center;
    color:var(--text-sub);
    margin-bottom:30px;
}

.mode-select{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.mode-btn{
    flex:1 1 220px;
    max-width:260px;
    background:var(--game-bg);
    border:1px solid var(--game-border);
    border-radius:15px;
    padding:30px 15px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
}

.mode-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.mode-icon{
    font-size:40px;
    margin-bottom:12px;
}

.mode-title{
    font-size:18px;
    font-weight:bold;
    color:var(--text-main);
    margin-bottom:6px;
}

.mode-desc{
    font-size:13px;
    color:var(--text-sub);
    margin-bottom:0;
}

.back-btn{
    display:inline-block;
    color:var(--text-sub);
    font-size:14px;
    cursor:pointer;
    margin-bottom:15px;
}

.back-btn:hover{
    color:var(--text-main);
}

.reading-view h2{
    text-align:center;
    margin-bottom:20px;
    color:var(--text-main);
}

.tarot-result{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:24px;
    margin-bottom:10px;
}

.tarot-card{
    width:160px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    animation:pop .4s;
}

.tarot-card img{
    width:140px;
    border-radius:10px;
    box-shadow:0 8px 16px rgba(0,0,0,.25);
    margin-bottom:10px;
}

.tarot-label{
    font-size:12px;
    font-weight:bold;
    color:var(--text-sub);
    margin-bottom:6px;
    letter-spacing:1px;
}

.tarot-name{
    font-weight:bold;
    color:var(--text-main);
    margin-bottom:6px;
}

.tarot-meaning{
    font-size:13px;
    color:var(--text-sub);
    line-height:1.5;
}

button{
    display:block;
    margin:35px auto 0;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#007bff;
    color:white;
    transition:.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.05);
}

.form-container{
    margin-top:35px;
    padding-top:30px;
    border-top:1px solid var(--game-border);
}

.form-container h2{
    text-align:center;
    margin-bottom:10px;
    color:var(--text-main);
    font-size:22px;
}

.form-group{
    margin-bottom:16px;
}

.form-group label{
    display:block;
    margin-bottom:6px;
    color:var(--text-main);
    font-weight:bold;
    font-size:14px;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--game-border);
    background:var(--game-bg);
    color:var(--text-main);
    font-size:15px;
    font-family:inherit;
}

.form-group textarea{
    resize:vertical;
    min-height:110px;
}

.form-status{
    text-align:center;
    margin-top:15px;
    font-size:14px;
    min-height:18px;
}

@keyframes pop{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@media(max-width:600px){

.tarot-card{
    width:120px;
}

.tarot-card img{
    width:105px;
}

}
</style>

</head>
<body>

<div class="page">

<div class="container">

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>

<h1>🔮 타로 리딩</h1>
<p>원하는 리딩 방식을 선택해주세요.</p>

<div id="modeSelect" class="mode-select">

<div class="mode-btn" onclick="startReading('daily')">
<div class="mode-icon">🃏</div>
<div class="mode-title">오늘의 카드</div>
<div class="mode-desc">카드 1장으로 보는 오늘의 메시지</div>
</div>

<div class="mode-btn" onclick="startReading('spread')">
<div class="mode-icon">🔯</div>
<div class="mode-title">3장 스프레드</div>
<div class="mode-desc">과거 · 현재 · 미래 흐름 보기</div>
</div>

</div>

<div id="readingView" class="reading-view" style="display:none;">

<div class="back-btn" onclick="backToMenu()">← 처음으로</div>

<h2 id="readingTitle"></h2>

<div id="tarotResult" class="tarot-result"></div>

<button onclick="drawCards()">🔮 다시 뽑기</button>

</div>

<div class="form-container" id="formContainer" style="display:none;">

<h2>🤝 제휴 문의</h2>
<p>제휴 및 협업 문의는 아래 양식을 작성해주세요.</p>

<form id="contactForm" action="https://formspree.io/f/xzdnvbbv" method="POST">

<div class="form-group">
<label for="name">이름</label>
<input type="text" id="name" name="name" required>
</div>

<div class="form-group">
<label for="email">이메일</label>
<input type="email" id="email" name="email" required>
</div>

<div class="form-group">
<label for="message">문의 내용</label>
<textarea id="message" name="message" required></textarea>
</div>

<button type="submit">📩 문의 보내기</button>

<p id="formStatus" class="form-status"></p>

</form>

</div>

</div>

<div class="comments-container" id="commentsContainer" style="display:none;">

<h2>💬 댓글</h2>

<div id="giscusContainer"></div>

</div>

</div>

let currentMode=null;

function shuffleDeck(){
    return [...tarotDeck].sort(()=>Math.random()-0.5);
}

function startReading(mode){

    currentMode=mode;

    document.getElementById("modeSelect").style.display="none";
    document.getElementById("readingView").style.display="block";
    document.getElementById("readingTitle").textContent=mode==="daily" ? "🃏 오늘의 카드" : "🔯 3장 스프레드";

    drawCards();

}

function backToMenu(){

    currentMode=null;

    document.getElementById("readingView").style.display="none";
    document.getElementById("modeSelect").style.display="flex";
    document.getElementById("formContainer").style.display="none";
    document.getElementById("commentsContainer").style.display="none";

}

function drawCards(){

    const shuffled=shuffleDeck();
    const count=currentMode==="daily" ? 1 : 3;
    const picks=shuffled.slice(0,count);
    const labels=currentMode==="spread" ? ["과거","현재","미래"] : [];

    const result=document.getElementById("tarotResult");
    result.innerHTML="";

    picks.forEach((card,i)=>{

        const cardDiv=document.createElement("div");
        cardDiv.className="tarot-card";

        if(labels[i]){
            const label=document.createElement("div");
            label.className="tarot-label";
            label.textContent=labels[i];
            cardDiv.appendChild(label);
        }

        const img=document.createElement("img");
        img.src=card.img;
        img.alt=card.name;

        const name=document.createElement("div");
        name.className="tarot-name";
        name.textContent=card.name;

        const meaning=document.createElement("div");
        meaning.className="tarot-meaning";
        meaning.textContent=card.meaning;

        cardDiv.appendChild(img);
        cardDiv.appendChild(name);
        cardDiv.appendChild(meaning);

        result.appendChild(cardDiv);

    });

    document.getElementById("formContainer").style.display="block";
    document.getElementById("commentsContainer").style.display="block";

}

function loadGiscus(theme){

    const script=document.createElement("script");
    script.src="https://giscus.app/client.js";
    script.setAttribute("data-repo","joduhan/productbuilder");
    script.setAttribute("data-repo-id","R_kgDOTezNHg");
    script.setAttribute("data-category","General");
    script.setAttribute("data-category-id","DIC_kwDOTezNHs4DBoyQ");
    script.setAttribute("data-mapping","pathname");
    script.setAttribute("data-strict","0");
    script.setAttribute("data-reactions-enabled","1");
    script.setAttribute("data-emit-metadata","0");
    script.setAttribute("data-input-position","bottom");
    script.setAttribute("data-theme",theme==="dark" ? "dark" : "light");
    script.setAttribute("data-lang","ko");
    script.crossOrigin="anonymous";
    script.async=true;

    document.getElementById("giscusContainer").appendChild(script);

}

function syncGiscusTheme(theme){

    const iframe=document.querySelector(".giscus-frame");
    if(!iframe) return;

    iframe.contentWindow.postMessage({
        giscus:{setConfig:{theme:theme==="dark" ? "dark" : "light"}}
    },"https://giscus.app");

}

function applyTheme(theme){

    document.documentElement.setAttribute("data-theme",theme);
    document.getElementById("themeToggle").textContent=theme==="dark" ? "☀️" : "🌙";
    localStorage.setItem("theme",theme);
    syncGiscusTheme(theme);

}

function toggleTheme(){

    const current=document.documentElement.getAttribute("data-theme");
    applyTheme(current==="dark" ? "light" : "dark");

}

const savedTheme=localStorage.getItem("theme")
    || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

applyTheme(savedTheme);
loadGiscus(savedTheme);

document.getElementById("contactForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const form=e.target;
    const status=document.getElementById("formStatus");
    const submitBtn=form.querySelector("button[type=submit]");

    submitBtn.disabled=true;
    status.textContent="전송 중...";
    status.style.color="var(--text-sub)";

    try{

        const response=await fetch(form.action,{
            method:"POST",
            body:new FormData(form),
            headers:{"Accept":"application/json"}
        });

        if(response.ok){
            status.textContent="문의가 접수되었습니다. 감사합니다!";
            status.style.color="#2e9e44";
            form.reset();
        }else{
            status.textContent="전송에 실패했습니다. 잠시 후 다시 시도해주세요.";
            status.style.color="#ff4d4d";
        }

    }catch(err){
        status.textContent="전송 중 오류가 발생했습니다.";
        status.style.color="#ff4d4d";
    }

    submitBtn.disabled=false;

});
