<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로또 번호 추천기 (5게임)</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Pretendard","Malgun Gothic",sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:850px;
    background:#fff;
    border-radius:20px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#333;
}

p{
    text-align:center;
    color:#777;
    margin-bottom:30px;
}

#lottoContainer{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.game{
    background:#fafafa;
    border-radius:15px;
    padding:18px;
    border:1px solid #e5e5e5;
}

.game-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
    color:#333;
}

.numbers{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.ball{
    width:55px;
    height:55px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:20px;
    font-weight:bold;
    animation:pop .4s;
    box-shadow:0 5px 10px rgba(0,0,0,.15);
}

button{
    display:block;
    margin:35px auto 0;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#007bff;
    color:white;
    transition:.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.05);
}

@keyframes pop{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

@media(max-width:600px){

.ball{
    width:45px;
    height:45px;
    font-size:16px;
}

.game-title{
    font-size:18px;
}

}
</style>

</head>
<body>

<div class="container">

<h1>🎲 로또 번호 추천기</h1>
<p>버튼을 누르면 로또 번호 5게임을 추천합니다.</p>

<div id="lottoContainer"></div>

<button onclick="generateFiveGames()">
🎲 번호 5게임 추천받기
</button>

</div>

<script>

function getColor(num){

    if(num<=10) return "#fbc400";     // 노랑
    if(num<=20) return "#69c8f2";     // 파랑
    if(num<=30) return "#ff7272";     // 빨강
    if(num<=40) return "#aaaaaa";     // 회색
    return "#7bcc66";                 // 초록

}

function createGame(){

    const numbers=[];

    while(numbers.length<6){

        const random=Math.floor(Math.random()*45)+1;

        if(!numbers.includes(random)){
            numbers.push(random);
        }

    }

    return numbers.sort((a,b)=>a-b);

}

function generateFiveGames(){

    const container=document.getElementById("lottoContainer");
    container.innerHTML="";

    const labels=["A","B","C","D","E"];

    for(let i=0;i<5;i++){

        const game=createGame();

        const gameDiv=document.createElement("div");
        gameDiv.className="game";

        const title=document.createElement("div");
        title.className="game-title";
        title.textContent=`${labels[i]} 게임`;

        const numbers=document.createElement("div");
        numbers.className="numbers";

        game.forEach(num=>{

            const ball=document.createElement("div");
            ball.className="ball";
            ball.style.background=getColor(num);
            ball.textContent=num;

            numbers.appendChild(ball);

        });

        gameDiv.appendChild(title);
        gameDiv.appendChild(numbers);

        container.appendChild(gameDiv);

    }

}

generateFiveGames();

</script>

</body>
</html>
