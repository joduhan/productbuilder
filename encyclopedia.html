<script>

function applyTheme(theme){
    document.documentElement.setAttribute("data-theme",theme);
    document.getElementById("themeToggle").textContent=theme==="dark" ? "☀️" : "🌙";
    localStorage.setItem("theme",theme);
}

function toggleTheme(){
    const current=document.documentElement.getAttribute("data-theme");
    applyTheme(current==="dark" ? "light" : "dark");
}

const savedTheme=localStorage.getItem("theme")
    || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

applyTheme(savedTheme);

const suits=[
    {title:"메이저 아르카나 (22장)",cards:tarotDeck.slice(0,22)},
    {title:"완드 (14장)",cards:tarotDeck.slice(22,36)},
    {title:"컵 (14장)",cards:tarotDeck.slice(36,50)},
    {title:"소드 (14장)",cards:tarotDeck.slice(50,64)},
    {title:"펜타클 (14장)",cards:tarotDeck.slice(64,78)}
];

const content=document.getElementById("encyclopediaContent");

suits.forEach(suit=>{

    const section=document.createElement("div");
    section.className="suit-section";

    const title=document.createElement("div");
    title.className="suit-title";
    title.textContent=suit.title;
    section.appendChild(title);

    const grid=document.createElement("div");
    grid.className="card-grid";

    suit.cards.forEach(card=>{

        const cardEl=document.createElement("div");
        cardEl.className="enc-card";

        const img=document.createElement("img");
        img.src=card.img;
        img.alt=card.name;
        img.loading="lazy";

        const name=document.createElement("div");
        name.className="enc-name";
        name.textContent=card.name;

        const meaning=document.createElement("div");
        meaning.className="enc-meaning";
        meaning.textContent=card.meaning;

        cardEl.appendChild(img);
        cardEl.appendChild(name);
        cardEl.appendChild(meaning);

        grid.appendChild(cardEl);

    });

    section.appendChild(grid);
    content.appendChild(section);

});

</script>
